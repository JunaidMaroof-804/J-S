<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>S & J — Forever ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --maroon:      #6B0F1A;
      --maroon-deep: #2E0007;
      --gold:        #C9A84C;
      --gold-light:  #EDD98A;
      --cream:       #FDF6EC;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { font-family: 'Cormorant Garamond', serif; background: var(--maroon-deep); color: var(--cream); }

    /* BACKGROUND */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 90% 70% at 15% 10%, rgba(139,26,42,0.72) 0%, transparent 60%),
        radial-gradient(ellipse 70% 60% at 85% 90%, rgba(107,15,26,0.82) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 50% 50%, rgba(100,10,20,0.35) 0%, transparent 70%),
        linear-gradient(160deg, #1a0004 0%, #2E0007 40%, #1a0004 100%);
    }
    .bg-dots {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(201,168,76,0.17) 1px, transparent 1px);
      background-size: 34px 34px;
    }
    .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(65px); }
    .orb-1 { width:500px; height:500px; top:-100px; left:-100px; background:rgba(139,26,42,0.32); animation:orbD 18s ease-in-out infinite alternate; }
    .orb-2 { width:400px; height:400px; bottom:-80px; right:-80px; background:rgba(107,15,26,0.38); animation:orbD 14s ease-in-out infinite alternate-reverse; }
    .orb-3 { width:280px; height:280px; top:40%; left:50%; transform:translate(-50%,-50%); background:rgba(201,168,76,0.07); animation:orbD 22s ease-in-out infinite alternate; }
    @keyframes orbD { from{transform:scale(1) translate(0,0);} to{transform:scale(1.15) translate(28px,18px);} }
    .orb-1,.orb-2 { animation-name:orbD; }

    .petals { position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
    .petal { position:absolute; opacity:0.13; animation:petalF linear infinite; user-select:none; }
    @keyframes petalF {
      0%   { transform:translateY(-80px) translateX(0) rotate(0deg); opacity:0; }
      5%   { opacity:0.13; }
      95%  { opacity:0.07; }
      100% { transform:translateY(110vh) translateX(40px) rotate(540deg); opacity:0; }
    }

    /* CORNER DECOS */
    .cdeco { position:fixed; opacity:0.12; pointer-events:none; z-index:1; font-size:clamp(1.2rem,3vw,2rem); animation:cSway 5s ease-in-out infinite alternate; }
    @keyframes cSway { from{transform:rotate(-10deg) scale(0.9);} to{transform:rotate(10deg) scale(1.1);} }
    .c-tl{top:1rem;left:1rem;} .c-tr{top:1rem;right:1rem;animation-direction:alternate-reverse;}
    .c-bl{bottom:1rem;left:1rem;animation-delay:1s;} .c-br{bottom:1rem;right:1rem;animation-delay:1s;animation-direction:alternate-reverse;}

    /* PASSWORD GATE */
    #gate {
      position:fixed; inset:0; z-index:9000;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.8rem;
      background: radial-gradient(ellipse at center, rgba(107,15,26,0.6) 0%, rgba(46,0,7,0.98) 70%);
      transition: opacity 0.9s ease, visibility 0.9s ease;
    }
    #gate.gone { opacity:0; visibility:hidden; pointer-events:none; }

    .gate-rose { font-size:3rem; animation:grPulse 2.2s ease-in-out infinite; }
    @keyframes grPulse { 0%,100%{transform:scale(1) rotate(-5deg);} 50%{transform:scale(1.15) rotate(5deg);} }

    .gate-title {
      font-family:'Great Vibes',cursive;
      font-size:clamp(2.2rem,7vw,3.6rem);
      color:var(--gold-light); text-align:center;
      text-shadow:0 0 40px rgba(201,168,76,0.5); line-height:1.2;
    }
    .gate-box {
      background:rgba(255,255,255,0.045); border:1px solid rgba(201,168,76,0.3);
      border-radius:18px; padding:2.2rem 2rem;
      width:min(360px,90vw); display:flex; flex-direction:column; align-items:center; gap:1.3rem;
      backdrop-filter:blur(14px); box-shadow:0 8px 50px rgba(0,0,0,0.5), inset 0 0 30px rgba(139,26,42,0.1);
    }
    .gate-label { font-family:'Cinzel',serif; font-size:0.68rem; letter-spacing:0.22em; color:var(--gold); opacity:0.8; text-transform:uppercase; }
    .gate-input {
      width:100%; padding:0.9rem 1.2rem;
      background:rgba(255,255,255,0.07); border:1px solid rgba(201,168,76,0.4); border-radius:9px;
      color:var(--cream); font-family:'Cormorant Garamond',serif; font-size:1.2rem;
      letter-spacing:0.2em; text-align:center; outline:none;
      transition:border-color 0.3s, box-shadow 0.3s;
    }
    .gate-input:focus { border-color:var(--gold); box-shadow:0 0 22px rgba(201,168,76,0.25); }
    .gate-input::placeholder { color:rgba(253,246,236,0.3); letter-spacing:0.1em; }
    .gate-btn {
      width:100%; padding:0.9rem;
      background:linear-gradient(135deg,var(--gold) 0%,#9a2535 100%);
      border:none; border-radius:9px; color:var(--maroon-deep);
      font-family:'Cinzel',serif; font-size:0.78rem; letter-spacing:0.22em; font-weight:600;
      cursor:pointer; transition:transform 0.2s, box-shadow 0.2s;
    }
    .gate-btn:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(201,168,76,0.4); }
    .gate-btn:active { transform:translateY(0); }
    .gate-err { color:#ff8a9a; font-size:0.85rem; font-style:italic; min-height:1.2em; text-align:center; }

    /* MAIN STAGE */
    #stage { position:fixed; inset:0; z-index:2; display:none; flex-direction:column; align-items:center; justify-content:center; }
    #stage.visible { display:flex; }

    .wordmark {
      font-family:'Great Vibes',cursive;
      font-size:clamp(2.2rem,7vw,4rem); color:var(--gold-light);
      text-shadow:0 0 50px rgba(201,168,76,0.45), 0 2px 10px rgba(46,0,7,0.9);
      animation:wGlow 4s ease-in-out infinite alternate;
      letter-spacing:0.02em; margin-bottom:0.15rem;
    }
    @keyframes wGlow {
      from{text-shadow:0 0 20px rgba(201,168,76,0.3), 0 2px 10px rgba(46,0,7,0.9);}
      to  {text-shadow:0 0 70px rgba(201,168,76,0.8), 0 2px 10px rgba(46,0,7,0.9);}
    }
    .tagline { font-family:'Cinzel',serif; font-size:clamp(0.55rem,1.5vw,0.72rem); letter-spacing:0.35em; color:var(--gold); opacity:0.6; text-transform:uppercase; margin-bottom:1.8rem; }

    /* CHARACTER ANIMATION */
    .anim-stage {
      position:relative;
      width:min(520px,92vw); height:clamp(120px,22vw,185px);
      margin-bottom:2.2rem; overflow:visible;
    }
    .char { position:absolute; bottom:0; display:flex; flex-direction:column; align-items:center; gap:2px; }
    .legs { display:flex; gap:5px; }
    .leg {
      width:5px; border-radius:3px; height:clamp(12px,2.5vw,18px);
      background:var(--gold); transform-origin:top center;
    }
    .char-s .leg { background:var(--gold-light); }
    .leg:nth-child(1) { animation:legL 0.45s ease-in-out infinite alternate; }
    .leg:nth-child(2) { animation:legR 0.45s ease-in-out infinite alternate; }
    @keyframes legL { from{transform:rotate(-20deg);} to{transform:rotate(20deg);} }
    @keyframes legR { from{transform:rotate(20deg);}  to{transform:rotate(-20deg);} }

    .char-letter {
      font-family:'Great Vibes',cursive;
      font-size:clamp(2.2rem,6.5vw,3.8rem); line-height:1;
      filter:drop-shadow(0 0 14px rgba(201,168,76,0.65));
    }
    .char-s .char-letter { color:var(--gold-light); }
    .char-j .char-letter { color:var(--gold); }

    .held-heart {
      font-size:clamp(0.9rem,2vw,1.3rem); position:absolute; top:-8px;
      animation:hFloat 1.1s ease-in-out infinite;
    }
    @keyframes hFloat { 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-6px) scale(1.2);} }

    .char-s { left:0%; animation:walkS 3.8s cubic-bezier(0.25,0.46,0.45,0.94) forwards, bounceS 1.6s ease-in-out infinite 4s; }
    .char-j { right:0%; animation:walkJ 3.8s cubic-bezier(0.25,0.46,0.45,0.94) forwards, bounceJ 1.6s ease-in-out infinite 4s; }
    @keyframes walkS { 0%{left:0%;} 85%{left:calc(50% - 55px);} 100%{left:calc(50% - 50px);} }
    @keyframes walkJ { 0%{right:0%;} 85%{right:calc(50% - 55px);} 100%{right:calc(50% - 50px);} }
    @keyframes bounceS { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-7px);} }
    @keyframes bounceJ { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-7px);} }
    .char-s.met .legs .leg, .char-j.met .legs .leg { animation:none; }

    .exheart {
      position:absolute; bottom:52px; left:50%;
      transform:translateX(-50%) scale(0);
      font-size:clamp(2rem,5.5vw,3rem);
      animation:exBloom 1s cubic-bezier(0.34,1.56,0.64,1) 4s forwards;
      z-index:3;
    }
    @keyframes exBloom {
      0%  {transform:translateX(-50%) scale(0) translateY(10px); opacity:0;}
      60% {transform:translateX(-50%) scale(1.3) translateY(-12px); opacity:1;}
      100%{transform:translateX(-50%) scale(1) translateY(0); opacity:1;}
    }
    .sparkle { position:absolute; font-size:clamp(0.6rem,1.5vw,0.9rem); opacity:0; animation:sPop 0.7s ease-out forwards; }
    @keyframes sPop { 0%{opacity:0;transform:scale(0) translate(0,0);} 50%{opacity:1;} 100%{opacity:0;transform:scale(1.4) translate(var(--dx),var(--dy));} }

    /* ORNAMENT */
    .ornament { display:flex; align-items:center; gap:1rem; color:var(--gold); opacity:0.35; width:min(340px,80vw); margin:1rem 0; }
    .oLine { flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }

    /* HEART BUTTON */
    .heart-btn {
      background:none; border:none; cursor:pointer;
      display:flex; flex-direction:column; align-items:center; gap:0.5rem;
      transition:transform 0.2s; -webkit-tap-highlight-color:transparent;
    }
    .heart-btn:hover { transform:scale(1.07); }
    .heart-btn:active { transform:scale(0.96); }
    .heart-icon {
      font-size:clamp(4rem,11vw,6rem); display:block;
      animation:hPulse 1.35s ease-in-out infinite;
      filter:drop-shadow(0 0 18px rgba(220,20,60,0.7));
    }
    @keyframes hPulse {
      0%,100%{transform:scale(1);    filter:drop-shadow(0 0 12px rgba(220,20,60,0.6));}
      50%    {transform:scale(1.22); filter:drop-shadow(0 0 45px rgba(220,20,60,1));}
    }
    .heart-label { font-family:'Cinzel',serif; font-size:clamp(0.58rem,1.4vw,0.72rem); letter-spacing:0.25em; color:var(--gold); opacity:0.65; text-transform:uppercase; }

    /* FLYING HEARTS */
    #ho { position:fixed; inset:0; z-index:500; pointer-events:none; display:none; }
    #ho.on { display:block; }
    .fh { position:absolute; animation:flyH linear forwards; will-change:transform,opacity; }
    @keyframes flyH {
      0%  {transform:translateY(0) scale(var(--s0)) rotate(var(--r0)); opacity:1;}
      85% {opacity:1;}
      100%{transform:translateY(-112vh) scale(var(--s1)) rotate(var(--r1)); opacity:0;}
    }

    /* LOVE POPUP */
    #lp { position:fixed; inset:0; z-index:600; display:none; align-items:center; justify-content:center; padding:1.5rem; background:rgba(20,0,5,0.82); backdrop-filter:blur(10px); }
    #lp.on { display:flex; }
    .pi {
      background:radial-gradient(ellipse at top, rgba(139,26,42,0.96) 0%, rgba(25,0,6,0.98) 100%);
      border:1px solid rgba(201,168,76,0.4); border-radius:22px;
      padding:clamp(2rem,6vw,4rem) clamp(1.5rem,5vw,3.5rem);
      max-width:580px; width:100%; text-align:center;
      box-shadow:0 0 0 1px rgba(201,168,76,0.1), 0 30px 100px rgba(0,0,0,0.8), inset 0 0 80px rgba(139,26,42,0.25);
      animation:popIn 0.75s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes popIn { from{transform:scale(0.55) translateY(30px);opacity:0;} to{transform:scale(1) translateY(0);opacity:1;} }
    .proses { font-size:clamp(1.6rem,4vw,2.4rem); margin-bottom:1.2rem; animation:rW 2.5s ease-in-out infinite; }
    @keyframes rW { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-5px);} }
    .pmsg {
      font-family:'Great Vibes',cursive;
      font-size:clamp(1.6rem,4.5vw,2.5rem);
      color:var(--gold-light); line-height:1.65;
      text-shadow:0 0 30px rgba(201,168,76,0.5), 0 2px 8px rgba(0,0,0,0.7);
    }
    .pclose {
      margin-top:2rem; padding:0.75rem 2.5rem;
      background:linear-gradient(135deg,var(--gold),#9a2535);
      border:none; border-radius:50px; color:var(--maroon-deep);
      font-family:'Cinzel',serif; font-size:0.72rem; letter-spacing:0.2em; font-weight:600;
      cursor:pointer; transition:transform 0.2s, box-shadow 0.2s;
    }
    .pclose:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(201,168,76,0.45); }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="bg-dots"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="petals" id="petals"></div>
  <div class="cdeco c-tl">🌹</div>
  <div class="cdeco c-tr">🌸</div>
  <div class="cdeco c-bl">🌸</div>
  <div class="cdeco c-br">🌹</div>

  <!-- PASSWORD GATE -->
  <div id="gate">
    <div class="gate-rose">🌹</div>
    <div class="gate-title">Shagufta & Junaid</div>
    <div class="gate-box">
      <div class="gate-label">Enter the secret word</div>
      <input id="pwd" class="gate-input" type="password" placeholder="••••••••" autocomplete="off" spellcheck="false"/>
      <button class="gate-btn" onclick="unlock()">ENTER WITH LOVE ❤️</button>
      <div class="gate-err" id="gate-err"></div>
    </div>
  </div>

  <!-- MAIN STAGE -->
  <div id="stage">
    <div class="wordmark">Shagufta & Junaid</div>
    <div class="tagline">Two hearts · One soul · Forever</div>

    <div class="anim-stage" id="anim-stage">
      <div class="char char-s" id="char-s">
        <div class="held-heart">💗</div>
        <div class="char-letter">S</div>
        <div class="legs"><div class="leg"></div><div class="leg"></div></div>
      </div>
      <div class="exheart">💞</div>
      <div class="char char-j" id="char-j">
        <div class="held-heart">💗</div>
        <div class="char-letter">J</div>
        <div class="legs"><div class="leg"></div><div class="leg"></div></div>
      </div>
    </div>

    <div class="ornament">
      <div class="oLine"></div><span>🌹</span><div class="oLine"></div>
    </div>

    <button class="heart-btn" onclick="triggerLove()" aria-label="Tap to share love">
      <span class="heart-icon">❤️</span>
      <span class="heart-label">Tap to share love</span>
    </button>
  </div>

  <!-- Flying hearts overlay -->
  <div id="ho"></div>

  <!-- Love message popup -->
  <div id="lp">
    <div class="pi">
      <div class="proses">🌹 ❤️ 🌹</div>
      <div class="pmsg">
        I love you, you are my soulmate.<br>
        You and me forever —<br>
        together in this world<br>
        and together in Jannah, InshaAllah.<br>
        We are one, always and forever. 💕
      </div>
      <button class="pclose" onclick="closePopup()">Close with love ❤️</button>
    </div>
  </div>

  <script>
    const PASSWORD = "shagufta2024"; // Change this!

    document.getElementById('pwd').addEventListener('keydown', e => { if(e.key==='Enter') unlock(); });

    function unlock(){
      const v = document.getElementById('pwd').value;
      const e = document.getElementById('gate-err');
      if(v === PASSWORD){
        document.getElementById('gate').classList.add('gone');
        document.getElementById('stage').classList.add('visible');
        spawnPetals();
        setTimeout(stopLegs, 4150);
      } else {
        e.textContent = 'Incorrect password. Try again, my love. 💔';
        document.getElementById('pwd').value = '';
        document.getElementById('pwd').focus();
        setTimeout(()=>{ e.textContent=''; }, 3000);
      }
    }

    function spawnPetals(){
      const c = document.getElementById('petals');
      const s = ['🌹','🌸','💕','✨','🌺','💗','🌼','🦋','❤️'];
      for(let i=0;i<28;i++){
        const el = document.createElement('div');
        el.className='petal';
        el.textContent = s[i%s.length];
        el.style.left = Math.random()*100+'%';
        el.style.fontSize = (0.7+Math.random()*1.3)+'rem';
        el.style.animationDuration = (9+Math.random()*14)+'s';
        el.style.animationDelay = (-Math.random()*18)+'s';
        c.appendChild(el);
      }
    }

    function stopLegs(){
      document.getElementById('char-s').classList.add('met');
      document.getElementById('char-j').classList.add('met');
      spawnSparkles();
    }

    function spawnSparkles(){
      const stage = document.getElementById('anim-stage');
      const cx = stage.offsetWidth/2;
      const syms = ['✨','💫','⭐','💛','🌟'];
      for(let i=0;i<8;i++){
        const sp=document.createElement('div');
        sp.className='sparkle';
        const ang=(i/8)*Math.PI*2, r=45+Math.random()*25;
        sp.style.setProperty('--dx',Math.cos(ang)*r+'px');
        sp.style.setProperty('--dy',Math.sin(ang)*r+'px');
        sp.style.left=(cx-8)+'px'; sp.style.bottom='75px';
        sp.style.animationDelay=(0.1*i)+'s';
        sp.textContent=syms[i%syms.length];
        stage.appendChild(sp);
        setTimeout(()=>sp.remove(), 1200+100*i);
      }
    }

    let loveActive=false;

    function triggerLove(){
      if(loveActive) return;
      loveActive=true;
      const o=document.getElementById('ho');
      o.innerHTML=''; o.classList.add('on');
      const syms=['❤️','💕','💗','💓','💘','💝','🌹','✨','💖','💞','🩷','🌸'];
      for(let i=0;i<90;i++){
        const h=document.createElement('div');
        h.className='fh';
        h.textContent=syms[Math.floor(Math.random()*syms.length)];
        h.style.left=Math.random()*100+'vw';
        h.style.bottom='0';
        h.style.fontSize=(1.2+Math.random()*2.5)+'rem';
        h.style.animationDuration=(2.2+Math.random()*2.6)+'s';
        h.style.animationDelay=(Math.random()*1.2)+'s';
        h.style.setProperty('--s0',0.3+Math.random()*0.5);
        h.style.setProperty('--s1',0.9+Math.random()*1.2);
        h.style.setProperty('--r0',(Math.random()*60-30)+'deg');
        h.style.setProperty('--r1',(Math.random()*200-100)+'deg');
        o.appendChild(h);
      }
      setTimeout(()=>{
        o.classList.remove('on'); o.innerHTML='';
        document.getElementById('lp').classList.add('on');
      }, 3400);
    }

    function closePopup(){
      document.getElementById('lp').classList.remove('on');
      loveActive=false;
    }
  </script>
</body>
</html>
